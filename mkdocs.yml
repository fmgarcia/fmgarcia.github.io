site_name: Francisco García - Portfolio
site_url: https://fmgarcia.github.io/
site_description: Portal de proyectos de Francisco García - Inteligencia Artificial, Machine Learning y más
site_author: Francisco García

theme:
  name: material
  language: es
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
      primary: indigo
      accent: cyan

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
      primary: indigo
      accent: deep purple

nav:
  - 🏠 Inicio: index.md
  - 📚 Proyectos:
    - 🤖 Programación en IA: https://fmgarcia.github.io/programacionIA.github.io/
    - 🔬 Detección de Tumores: proyectos/deteccion-tumores.md
    - 🚀 Agencia IA - FMGarcia: proyectos/agencia-ia.md
  - 🎓 Cursos:
    - 💻 Curso de C# (.NET 9): https://fmgarcia.github.io/CursoNet/
    - 🧪 Curso de Testing: https://fmgarcia.github.io/CursoTesting/
  - 📬 Contacto: contacto.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemують
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/fmgarcia27/
      name: LinkedIn
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@fmgarcia
      name: YouTube
    - icon: fontawesome/brands/github
      link: https://github.com/fmgarcia
      name: GitHub

extra_css:
  - assets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2
  - assets/supabase-form.js

copyright: Copyright &copy; 2026 Francisco García
